# Temporary HTTP-only configuration used for the first ACME IP certificate.
# Replace this file with enterprise-ai-ip-https.conf immediately after issuance.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 45.133.36.77 _;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location ^~ /downloads/ {
        alias /var/www/enterprise-ai-downloads/;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment" always;
        try_files $uri =404;
    }

    location = /internal/metrics {
        return 404;
    }

    location / {
        return 308 https://45.133.36.77$request_uri;
    }
}
