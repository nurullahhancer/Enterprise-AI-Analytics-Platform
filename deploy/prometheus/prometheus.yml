global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: reai-app
    metrics_path: /internal/metrics
    static_configs:
      - targets: ["app:3010"]

  - job_name: reai-ml
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-service:8000"]
