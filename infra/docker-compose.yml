x-reference-defaults: &reference-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *reference-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enterprise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_ai}
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    <<: *reference-defaults
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["127.0.0.1:6379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  rabbitmq:
    <<: *reference-defaults
    image: rabbitmq:3-management-alpine
    ports: ["127.0.0.1:5672:5672", "127.0.0.1:15672:15672"]
    volumes: ["rabbitmq-data:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
  qdrant:
    <<: *reference-defaults
    image: qdrant/qdrant:v1.12.6
    ports: ["127.0.0.1:6333:6333"]
    volumes: ["qdrant-data:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  mlflow:
    <<: *reference-defaults
    image: ghcr.io/mlflow/mlflow:v2.18.0
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    ports: ["127.0.0.1:5001:5001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
  prometheus:
    <<: *reference-defaults
    image: prom/prometheus:v2.55.1
    ports: ["127.0.0.1:9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  grafana:
    <<: *reference-defaults
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
    ports: ["127.0.0.1:3002:3000"]
    volumes: ["grafana-data:/var/lib/grafana"]
    depends_on:
      prometheus: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  keycloak:
    <<: *reference-defaults
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD is required}
    ports: ["127.0.0.1:8081:8080"]
    volumes: ["keycloak-data:/opt/keycloak/data"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    <<: *reference-defaults
    build:
      context: ../backend
      dockerfile: EnterpriseAI.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Key: ${JWT_SECRET:?JWT_SECRET is required}
      Secrets__Key: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
    ports: ["127.0.0.1:5000:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  ml-service:
    <<: *reference-defaults
    build: ../ml-service
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
    ports: ["127.0.0.1:8000:8000"]
    depends_on:
      mlflow: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    <<: *reference-defaults
    build: ../frontend
    ports: ["127.0.0.1:3001:3001"]
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mlflow-data:
  postgres-data:
  redis-data:
  rabbitmq-data:
  qdrant-data:
  prometheus-data:
  grafana-data:
  keycloak-data:
