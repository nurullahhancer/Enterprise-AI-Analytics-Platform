name: ci

on:
  push:
  pull_request:

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: docker compose config --quiet

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore backend/EnterpriseAIAnalytics.sln
      - run: dotnet list backend/EnterpriseAIAnalytics.sln package --vulnerable --include-transitive
      - run: dotnet build backend/EnterpriseAIAnalytics.sln --no-restore
      - run: dotnet test backend/EnterpriseAIAnalytics.sln --no-build
  ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ml-service/requirements-dev.txt pip-audit
      - run: pip-audit -r ml-service/requirements.txt
      - run: python -m ruff check ml-service
      - run: pytest ml-service
  reference-next-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: frontend
      - run: npm audit
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
